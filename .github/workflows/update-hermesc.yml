name: Update Hermesc Binaries

on:
  schedule:
    # Fallback in case the repository_dispatch from the hermes repo's publish workflow doesn't fire.
    - cron: '0 */6 * * *'
  repository_dispatch:
    types: [hermesc-published]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: oven-sh/setup-bun@v2

      - name: Run updater
        id: update
        run: node scripts/update-hermesc.mjs

      - name: Refresh lockfile
        if: steps.update.outputs.changed == 'true'
        run: bun install

      - name: Open pull request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update held hermesc bytecode versions'
          title: 'chore: update held hermesc bytecode versions'
          body: |
            Automated update of the hermesc binaries this plugin compiles against.

            Held bytecode versions: ${{ steps.update.outputs.versions }}
          branch: automated/update-hermesc
          delete-branch: true
