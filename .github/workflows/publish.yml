name: Publish

on:
  push:
    branches: [main]
    paths:
      - package.json

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # OIDC token for npm trusted publishing (no NPM_TOKEN needed).
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - run: bun run build

      # Publish only when package.json's version differs from what's on npm.
      # This is the idempotency / loop guard: unrelated pushes and replayed
      # events (version already published) skip cleanly.
      - name: Publish gate
        id: gate
        run: node scripts/publish-gate.mjs

      # Authenticated via OIDC trusted publishing; requires npm >= 11.5.1 (node 24 ships it).
      - name: Publish to npm
        if: steps.gate.outputs.publish == 'true'
        run: npm publish

      # Wake the downstream consumer only after a real publish. A skipped publish
      # (unchanged version) leaves no dispatch.
      - name: Notify unbound of new release
        if: steps.gate.outputs.publish == 'true'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.UNBOUND_DISPATCH_TOKEN }}
          repository: marioparaschiv/unbound
          event-type: rollup-plugin-updated
